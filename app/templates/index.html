<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <meta charset="UTF-8" />
    <title>Banking Analytics Assistant</title>

    <style>
        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: #f5f6fa;
            color: #333;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* LEFT: CHAT PANEL */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ddd;
            background: white;
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 16px;
            max-width: 80%;
            line-height: 1.4;
        }

        .user {
            text-align: right;
        }

        .user .bubble {
            background: #0078d4;
            color: white;
            padding: 10px 14px;
            border-radius: 12px;
            display: inline-block;
        }

        .assistant .bubble {
            background: #e9ecef;
            padding: 10px 14px;
            border-radius: 12px;
            display: inline-block;
        }

        .input-row {
            display: flex;
            padding: 12px;
            border-top: 1px solid #ddd;
            background: #fafafa;
        }

        #user-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
        }

        button {
            margin-left: 10px;
            padding: 10px 16px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* RIGHT: DATA PANEL */
        .data-panel {
            width: 45%;
            padding: 20px;
            overflow-y: auto;
            background: #fafafa;
        }

        .panel-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .sql-block {
            background: #272822;
            color: #f8f8f2;
            padding: 12px;
            border-radius: 6px;
            white-space: pre-wrap;
            font-family: monospace;
            display: none; /* hidden by default */
            margin-bottom: 20px;
        }

        .toggle-sql {
            background: #444;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            margin-bottom: 10px;
            display: inline-block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 6px;
            overflow: hidden;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #eee;
            text-align: left;
        }

        th {
            background: #f0f0f0;
            font-weight: 600;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .theme-toggle {
        position: absolute;
        top: 12px;
        right: 12px;
        background: #444;
        color: white;
        padding: 8px 14px;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        z-index: 10;
    }

    /* DARK MODE */
    .dark-mode {
        background: #1e1e1e;
        color: #e0e0e0;
    }

    .dark-mode .chat-panel {
        background: #252526;
        border-right: 1px solid #333;
    }

    .dark-mode .assistant .bubble {
        background: #333;
        color: #eee;
    }

    .dark-mode .user .bubble {
        background: #0078d4;
    }

    .dark-mode .data-panel {
        background: #1e1e1e;
    }

    .dark-mode table {
        background: #2d2d2d;
        color: #ddd;
    }

    .dark-mode th {
        background: #3a3a3a;
    }

    .dark-mode tr:hover {
        background: #333;
    }

    .dark-mode .sql-block {
        background: #111;
    }

    .dark-mode .toggle-sql {
        background: #0078d4;
    }

    /* INPUT ROW IN DARK MODE */
    .dark-mode .input-row {
        background: #2a2a2a;
        border-top: 1px solid #444;
    }

    /* USER INPUT BOX IN DARK MODE */
    .dark-mode #user-input {
        background: #1e1e1e;
        color: #e0e0e0;
        border: 1px solid #555;
    }

    /* SEND BUTTON IN DARK MODE */
    .dark-mode button {
        background: #0078d4;
        color: white;
        border: none;
    }

    .dark-mode button:hover {
        background: #0a84e6;
    }


    .thinking {
        display: flex;
        gap: 6px;
        margin: 10px 0;
    }

    .dot {
        width: 10px;
        height: 10px;
        background: #aaa;
        border-radius: 50%;
        animation: blink 1.4s infinite both;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
        0% { opacity: 0.2; }
        20% { opacity: 1; }
        100% { opacity: 0.2; }
    }

    .dark-mode .dot {
        background: #ddd;
    }

    .bubble table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
    }

    .bubble th, .bubble td {
        border: 1px solid #ddd;
        padding: 6px;
    }

    .bubble th {
        background: #f0f0f0;
        font-weight: 600;
    }

    .dark-mode .bubble th {
        background: #333;
    }

    </style>
</head>

<body>
<button class="theme-toggle" onclick="toggleTheme()">🌙 Dark Mode</button>

<div class="container">

    <!-- LEFT: CHAT -->
    <div class="chat-panel">

        <!-- CHAT MESSAGES -->
        <div id="chat-box"></div>

        <!-- THINKING DOTS  -->
        <div id="thinking" class="thinking" style="display:none;">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <!-- INPUT ROW -->
        <div class="input-row">
            <input id="user-input" placeholder="Ask a question…" />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <!-- RIGHT: DATA PANEL -->
    <div class="data-panel">
        <div class="panel-header">Query Results</div>

        <div class="toggle-sql" onclick="toggleSQL()">Show SQL</div>
        <pre id="sql-box" class="sql-block"></pre>

        <div id="results-box"></div>
    </div>

</div>

<script>

function extractLatestSQL(history) {
    for (let i = history.length - 1; i >= 0; i--) {
        const msg = history[i];
        if (msg.role === "tool") {
            try {
                const data = JSON.parse(msg.content);

                // New format: detect columns + rows
                if (data.columns && data.rows) {
                    return data;
                }

            } catch (e) {
                console.error("Failed to parse tool content", e);
            }
        }
    }
    return null;
}

function showThinking() {
    const t = document.getElementById("thinking");
    t.style.display = "flex";
}

function hideThinking() {
    const t = document.getElementById("thinking");
    t.style.display = "none";
    void t.offsetHeight; 
}

function toggleTheme() {
    document.body.classList.toggle("dark-mode");

    const btn = document.querySelector(".theme-toggle");
    if (document.body.classList.contains("dark-mode")) {
        btn.textContent = "☀️ Light Mode";
    } else {
        btn.textContent = "🌙 Dark Mode";
    }
}

function addMessage(role, text) {
    const box = document.getElementById("chat-box");

    const msg = document.createElement("div");
    msg.className = `message ${role}`;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = marked.parse(text);

    msg.appendChild(bubble);
    box.appendChild(msg);
    box.scrollTop = box.scrollHeight;
}

function toggleSQL() {
    const sqlBlock = document.getElementById("sql-box");
    const toggle = document.querySelector(".toggle-sql");

    if (sqlBlock.style.display === "none") {
        sqlBlock.style.display = "block";
        toggle.textContent = "Hide SQL";
    } else {
        sqlBlock.style.display = "none";
        toggle.textContent = "Show SQL";
    }
}

function renderResultsTable(data) {
    const box = document.getElementById("results-box");
    box.innerHTML = "";

    if (!data || !data.rows || data.rows.length === 0) {
        box.textContent = "No results.";
        return;
    }

    const table = document.createElement("table");

    // Header
    const thead = document.createElement("thead");
    const headerRow = document.createElement("tr");

    data.columns.forEach(col => {
        const th = document.createElement("th");
        th.textContent = col;
        headerRow.appendChild(th);
    });

    thead.appendChild(headerRow);
    table.appendChild(thead);

    // Body
    const tbody = document.createElement("tbody");

    data.rows.forEach(row => {
        const tr = document.createElement("tr");
        row.forEach(val => {
            const td = document.createElement("td");
            td.textContent = val;
            tr.appendChild(td);
        });
        tbody.appendChild(tr);
    });

    table.appendChild(tbody);

    box.appendChild(table);
}


function sendMessage() {
    const input = document.getElementById("user-input");
    const text = input.value.trim();
    if (!text) return;

    addMessage("user", text);
    input.value = "";

    showThinking();

    fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
    })
    .then(res => res.json())
    .then(data => {
        hideThinking();
        addMessage("assistant", data.agent_response);

        const sqlData = extractLatestSQL(data.history);

        if (sqlData) {
            // Update SQL panel (optional)
            document.getElementById("sql-box").textContent =
                sqlData.sql || "(SQL not shown for this tool)";

            // Render table
            renderResultsTable(sqlData);
        } else {
            document.getElementById("sql-box").textContent = "No SQL executed.";
            renderResultsTable(null);
        }
    })
    .catch(err => {
        hideThinking();
        addMessage("assistant", "Something went wrong.");
    });

}
</script>

</body>
</html>
